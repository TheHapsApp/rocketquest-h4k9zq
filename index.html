<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Keep this page off Google so it stays our secret -->
  <meta name="robots" content="noindex, nofollow">
  <title>Ben's Rocket Quest</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    html, body { height: 100%; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, #0b1030, #241a52, #3a1c5c, #0b1030);
      background-size: 400% 400%;
      animation: flow 18s ease infinite;
      padding: 24px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .twinkle-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, #ffffff 1.5px, transparent 1.6px);
      background-size: 60px 60px;
      opacity: 0.5;
      animation: twinkle 3s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.25; }
      100% { opacity: 0.6; }
    }
    .page { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }
    h1 {
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    }
    .sub {
      font-size: clamp(0.9rem, 3.2vw, 1.1rem);
      margin: 8px 0 24px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    }

    /* ---- Rocket shape (shared between build + game screens) ---- */
    .rocket-unit { display: inline-flex; flex-direction: column; align-items: center; position: relative; }
    .rocket-nose {
      width: 0; height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 36px solid #ff5fa2;
      transition: border-bottom-color 0.15s ease;
    }
    .rocket-body {
      width: 44px;
      height: 76px;
      background: #3fd0ff;
      border-radius: 8px 8px 4px 4px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      border: 3px solid rgba(255,255,255,0.7);
      border-top: none;
    }
    .rocket-window {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #cdefff;
      border: 3px solid #fff;
    }
    .fin {
      position: absolute;
      width: 0;
      height: 0;
      border-top: 26px solid transparent;
      bottom: -4px;
    }
    .fin-left { border-right: 18px solid #ffd23f; left: -17px; transition: border-right-color 0.15s ease; }
    .fin-right { border-left: 18px solid #ffd23f; right: -17px; transition: border-left-color 0.15s ease; }
    .rocket-flame {
      width: 16px;
      height: 14px;
      background: linear-gradient(180deg, #ffd23f, #ff6b4a, transparent);
      border-radius: 0 0 8px 8px;
      animation: flicker 0.15s ease infinite alternate;
    }
    @keyframes flicker { 0% { opacity: 1; } 100% { opacity: 0.6; } }
    .rocket-unit.hit { animation: hitBlink 0.15s steps(1) infinite; }
    @keyframes hitBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.25; } }

    /* ---- Build screen ---- */
    .rocket-preview-wrap {
      display: flex;
      justify-content: center;
      margin: 10px 0 30px;
      transform: scale(1.4);
    }
    .picker-group { margin-bottom: 20px; text-align: left; }
    .picker-label {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    }
    .swatch-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.5);
      cursor: pointer;
    }
    .swatch.active { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.4); }

    /* ---- Buttons (shared) ---- */
    .big-btn {
      font-family: inherit;
      font-size: clamp(1rem, 4.5vw, 1.3rem);
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.18);
      border: 4px solid #fff;
      border-radius: 999px;
      padding: 14px 28px;
      box-shadow: 0 7px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      margin-top: 10px;
    }
    .big-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

    /* ---- Fullscreen game screen ---- */
    .game-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      background: linear-gradient(120deg, #0b1030, #241a52, #3a1c5c, #0b1030);
      background-size: 400% 400%;
      animation: flow 18s ease infinite;
      overflow: hidden;
      cursor: none;
    }
    .game-world { position: absolute; inset: 0; }
    .game-hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 5;
      padding: 14px 16px 0;
      pointer-events: none;
    }
    .hud-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      font-size: 1.1rem;
      font-weight: bold;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
      margin-bottom: 10px;
    }
    #fuelText.low { color: #ff4d4d; animation: flicker 0.4s ease infinite alternate; }
    .challenge-card {
      max-width: 340px;
      margin: 0 auto 10px;
      background: rgba(255,255,255,0.16);
      border: 3px solid #fff;
      border-radius: 18px;
      padding: 10px 14px;
    }
    .challenge-card.done { animation: popIn 0.4s ease; background: rgba(120,255,150,0.35); }
    @keyframes popIn {
      0% { transform: scale(0.8); }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .challenge-label { font-size: 0.8rem; opacity: 0.85; margin-bottom: 2px; }
    .challenge-text { font-size: 1rem; font-weight: bold; }
    .controls-hint { font-size: 0.85rem; opacity: 0.8; text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }

    .asteroid {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border: 3px solid rgba(255,255,255,0.6);
    }
    .floating-star {
      position: absolute;
      font-size: 1.5rem;
      animation: starGlow 1.4s ease-in-out infinite alternate;
    }
    @keyframes starGlow { 0% { opacity: 0.7; transform: scale(1); } 100% { opacity: 1; transform: scale(1.2); } }
    .item-pickup {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,210,63,0.3);
      border: 3px solid #ffd23f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      animation: starGlow 1.2s ease-in-out infinite alternate;
      cursor: pointer;
    }
    .item-badge {
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: #ff3b3b;
      color: #fff;
      font-size: 0.7rem;
      font-weight: bold;
      border-radius: 999px;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
    }
    .item-hud {
      max-width: 320px;
      margin: 0 auto 8px;
      background: rgba(255,210,63,0.22);
      border: 3px solid #ffd23f;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .bullet {
      position: absolute;
      width: 6px;
      height: 18px;
      border-radius: 4px;
      background: linear-gradient(180deg, #fff, #ffd23f);
      box-shadow: 0 0 6px #ffd23f;
    }
    .explosion {
      position: absolute;
      font-size: 3.2rem;
      animation: boomPop 0.6s ease;
      pointer-events: none;
    }
    @keyframes boomPop {
      0% { transform: scale(0.4); opacity: 1; }
      70% { transform: scale(1.6); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
    #gameRocket { position: absolute; z-index: 3; }

    .shoot-fab {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 6;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,107,74,0.55);
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
    }
    .corner-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 6;
      font-family: inherit;
      font-size: 0.8rem;
      color: #fff;
      background: rgba(0,0,0,0.35);
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
    }

    .gameover-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
    }
    .gameover-card {
      background: rgba(60,20,80,0.85);
      border: 4px solid #fff;
      border-radius: 26px;
      padding: 30px 26px;
      text-align: center;
      max-width: 320px;
    }
    .gameover-card h2 { margin: 10px 0; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
    .gameover-card p { margin-bottom: 16px; font-size: 1rem; }

    .alien {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 35% 25%, #e4ecf5, #7a8ba0 60%, #4b5b6e);
      box-shadow: inset 0 -6px 10px rgba(0,0,0,0.35), 0 4px 10px rgba(0,0,0,0.4);
      border: 3px solid rgba(255,255,255,0.8);
    }
    .alien.flash { filter: brightness(2.2); }
    .fighter {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 35% 30%, #9fe08a, #2f7a3d);
      border: 2px solid rgba(255,255,255,0.7);
    }
    .alien-hp {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff3b3b;
      color: #fff;
      font-size: 0.75rem;
      font-weight: bold;
      border-radius: 999px;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
    }
    #livesText.lives-gain { animation: popIn 0.4s ease; }
  </style>
</head>
<body>
  <div class="twinkle-layer"></div>

  <div class="page">
    <!-- ==== BUILD SCREEN ==== -->
    <div id="buildScreen">
      <h1>🚀 Build Your Rocket!</h1>
      <p class="sub">Pick your colors, then blast off!</p>

      <div class="rocket-preview-wrap">
        <div class="rocket-unit">
          <div class="rocket-nose"></div>
          <div class="rocket-body">
            <div class="rocket-window"></div>
            <div class="fin fin-left"></div>
            <div class="fin fin-right"></div>
          </div>
          <div class="rocket-flame"></div>
        </div>
      </div>

      <div class="picker-group">
        <div class="picker-label">Nose Cone</div>
        <div class="swatch-row" data-part="nose"></div>
      </div>
      <div class="picker-group">
        <div class="picker-label">Body</div>
        <div class="swatch-row" data-part="body"></div>
      </div>
      <div class="picker-group">
        <div class="picker-label">Fins</div>
        <div class="swatch-row" data-part="fins"></div>
      </div>

      <button class="big-btn" id="blastOffBtn">🚀 Blast Off!</button>
    </div>
  </div>

  <!-- ==== FULLSCREEN GAME SCREEN ==== -->
  <div class="game-screen" id="gameScreen">
    <div class="game-hud">
      <div class="hud-row">
        <div>⭐ <span id="starsText">0</span></div>
        <div>🛰️ <span id="milesText">0</span> mi</div>
        <div id="livesText">❤️ × 3</div>
        <div>⛽ <span id="fuelText">3:00</span></div>
      </div>
      <div class="challenge-card" id="challengeCard">
        <div class="challenge-label">🎯 Challenge</div>
        <div class="challenge-text" id="challengeText">-</div>
      </div>
      <div class="item-hud" id="itemHud" style="display:none;">🎒 <span id="heldItemText"></span> &mdash; press U!</div>
      <div class="controls-hint">🖱️ Move your mouse to fly &middot; Press A (or tap 🔫) to shoot &middot; Shoot ⭐ for fuel! &middot; Right-click items to grab, press U to use!</div>
    </div>

    <div class="game-world" id="gameWorld">
      <div class="rocket-unit" id="gameRocket">
        <div class="rocket-nose"></div>
        <div class="rocket-body">
          <div class="rocket-window"></div>
          <div class="fin fin-left"></div>
          <div class="fin fin-right"></div>
        </div>
        <div class="rocket-flame"></div>
      </div>
    </div>

    <button class="shoot-fab" id="shootFab">🔫</button>
    <button class="corner-btn" id="rebuildBtn">🎨 Rebuild</button>

    <div class="gameover-overlay" id="gameoverOverlay">
      <div class="gameover-card">
        <div id="gameoverIcon" style="font-size:3.2rem;">💥</div>
        <h2 id="gameoverTitle">You Crashed!</h2>
        <p id="gameoverStats"></p>
        <button class="big-btn" id="flyAgainBtn">🔄 Fly Again</button>
      </div>
    </div>
  </div>

  <script>
    var COLORS = ["#ff5fa2", "#ffd23f", "#3fd0ff", "#8a5cff", "#4ade80", "#ff6b4a", "#ffffff", "#ff3b3b"];
    var rocketColors = { nose: "#ff5fa2", body: "#3fd0ff", fins: "#ffd23f" };

    function applyRocketColors() {
      document.querySelectorAll(".rocket-nose").forEach(function (el) { el.style.borderBottomColor = rocketColors.nose; });
      document.querySelectorAll(".rocket-body").forEach(function (el) { el.style.background = rocketColors.body; });
      document.querySelectorAll(".fin-left").forEach(function (el) { el.style.borderRightColor = rocketColors.fins; });
      document.querySelectorAll(".fin-right").forEach(function (el) { el.style.borderLeftColor = rocketColors.fins; });
    }

    document.querySelectorAll(".swatch-row").forEach(function (row) {
      var part = row.getAttribute("data-part");
      COLORS.forEach(function (color) {
        var sw = document.createElement("div");
        sw.className = "swatch";
        sw.style.background = color;
        if (color === rocketColors[part]) sw.classList.add("active");
        sw.addEventListener("click", function () {
          rocketColors[part] = color;
          row.querySelectorAll(".swatch").forEach(function (s) { s.classList.remove("active"); });
          sw.classList.add("active");
          applyRocketColors();
          beep(500 + COLORS.indexOf(color) * 40);
        });
        row.appendChild(sw);
      });
    });
    applyRocketColors();

    var audioCtx = null;
    function beep(freq) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "triangle";
        o.frequency.value = freq;
        g.gain.value = 0.15;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
        o.stop(audioCtx.currentTime + 0.25);
      } catch (e) {}
    }

    /* ===================== GAME ===================== */
    var ROCKET_W = 50, ROCKET_H = 95;
    var gw = document.getElementById("gameWorld");
    var gameRocket = document.getElementById("gameRocket");
    var starsText = document.getElementById("starsText");
    var milesText = document.getElementById("milesText");
    var livesText = document.getElementById("livesText");
    var fuelText = document.getElementById("fuelText");
    var challengeText = document.getElementById("challengeText");
    var challengeCard = document.getElementById("challengeCard");

    var stars = 0, miles = 0, lives = 3;
    var currentChallenge = null;
    var running = false;
    var invulnerable = false;
    var distanceAccum = 0;
    var fuelSeconds = 180;
    var fuelTimer = null;

    var mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    var rocketX = mouseX, rocketY = mouseY;
    var lastRocketX = rocketX, lastRocketY = rocketY;

    function setPointer(x, y) { mouseX = x; mouseY = y; }
    document.addEventListener("mousemove", function (e) { setPointer(e.clientX, e.clientY); });
    document.addEventListener("touchmove", function (e) {
      if (e.touches && e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    var lastShot = 0;
    var shotCount = 1;
    var shotTimer = null;
    var cloneUntil = 0;
    var cloneEl = null;

    function fireBulletAt(x, y) {
      var el = document.createElement("div");
      el.className = "bullet";
      gw.appendChild(el);
      bullets.push({ el: el, x: x, y: y });
    }

    function shoot() {
      if (!running) return;
      var now = Date.now();
      if (now - lastShot < 250) return;
      lastShot = now;

      var baseX = rocketX - 3, baseY = rocketY - ROCKET_H / 2;
      fireBulletAt(baseX, baseY);
      if (shotCount >= 3) {
        fireBulletAt(baseX - 16, baseY + 6);
        fireBulletAt(baseX + 16, baseY + 6);
      }
      if (shotCount >= 5) {
        fireBulletAt(baseX - 30, baseY + 14);
        fireBulletAt(baseX + 30, baseY + 14);
      }
      if (cloneEl && now < cloneUntil) fireBulletAt(baseX + 70, baseY);
      beep(750);
    }
    document.addEventListener("keydown", function (e) {
      if (e.key === "a" || e.key === "A") shoot();
      if ((e.key === "u" || e.key === "U") && heldItem) useItem();
    });
    document.getElementById("shootFab").addEventListener("click", shoot);

    var ASTEROID_SPECS = [
      { color: "red", bg: "#ff5555" },
      { color: "blue", bg: "#4fa8ff" },
      { color: "green", bg: "#4ade80" },
      { color: "purple", bg: "#b06bff" }
    ];
    var asteroids = [];
    var starsList = [];
    var bullets = [];
    var aliens = [];
    var alienFighters = [];
    var alienTimer = null;
    var starBankForLife = 0;
    var ALIEN_TIERS = [
      { size: 44,  hp: 5,  reward: 10, damage: 0.5, fighterInterval: 30000 },
      { size: 64,  hp: 10, reward: 20, damage: 1,   fighterInterval: 15000 },
      { size: 88,  hp: 20, reward: 40, damage: 1.5, fighterInterval: 7500 },
      { size: 110, hp: 30, reward: 60, damage: 2,   fighterInterval: 5000 }
    ];

    var ITEM_SPECS = [
      { type: "mega",  emoji: "🔫", badge: "3" },
      { type: "ultra", emoji: "🔫", badge: "5" },
      { type: "clone", emoji: "👯", badge: "" }
    ];
    var ITEM_NAMES = { mega: "Mega Gun (x3 shots)", ultra: "Ultra Gun (x5 shots)", clone: "Clone (extra shot)" };
    var worldItems = [];
    var itemTimer = null;
    var heldItem = null;
    var itemHud = document.getElementById("itemHud");
    var heldItemText = document.getElementById("heldItemText");

    function randPos(size) {
      return {
        x: Math.random() * (window.innerWidth - size),
        y: Math.random() * (window.innerHeight - size - 60) + 60
      };
    }

    function spawnAsteroid(spec) {
      var el = document.createElement("div");
      el.className = "asteroid";
      el.textContent = "☄️";
      el.style.background = spec.bg;
      gw.appendChild(el);
      var size = 44;
      var pos = randPos(size);
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 1.2;
      return { el: el, x: pos.x, y: pos.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, color: spec.color, size: size };
    }

    function initAsteroids() {
      asteroids.forEach(function (a) { a.el.remove(); });
      asteroids = ASTEROID_SPECS.map(spawnAsteroid);
    }

    function respawnAsteroid(a) {
      var pos = randPos(a.size);
      a.x = pos.x; a.y = pos.y;
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 1.2;
      a.vx = Math.cos(angle) * speed;
      a.vy = Math.sin(angle) * speed;
    }

    function spawnStar() {
      var el = document.createElement("div");
      el.className = "floating-star";
      el.textContent = "⭐";
      gw.appendChild(el);
      var size = 26;
      var pos = randPos(size);
      return { el: el, x: pos.x, y: pos.y, size: size };
    }

    function initStars() {
      starsList.forEach(function (s) { s.el.remove(); });
      starsList = [];
      for (var i = 0; i < 5; i++) starsList.push(spawnStar());
    }

    function clearBullets() {
      bullets.forEach(function (b) { b.el.remove(); });
      bullets = [];
    }

    function hasItemType(type) {
      for (var i = 0; i < worldItems.length; i++) {
        if (worldItems[i].type === type) return true;
      }
      return false;
    }

    function spawnItem() {
      var spec = ITEM_SPECS[Math.floor(Math.random() * ITEM_SPECS.length)];
      if (hasItemType(spec.type)) return;
      var el = document.createElement("div");
      el.className = "item-pickup";
      el.textContent = spec.emoji;
      if (spec.badge) {
        var b = document.createElement("span");
        b.className = "item-badge";
        b.textContent = spec.badge;
        el.appendChild(b);
      }
      gw.appendChild(el);
      var size = 40;
      var pos = randPos(size);
      el.style.left = pos.x + "px";
      el.style.top = pos.y + "px";
      el.addEventListener("contextmenu", function (e) {
        e.preventDefault();
        pickUpItem(spec.type, el);
      });
      worldItems.push({ el: el, type: spec.type, x: pos.x, y: pos.y, size: size });
    }

    function scheduleNextItem() {
      clearTimeout(itemTimer);
      itemTimer = setTimeout(function () {
        if (running) { spawnItem(); scheduleNextItem(); }
      }, 8000 + Math.random() * 7000);
    }

    function clearItems() {
      worldItems.forEach(function (w) { w.el.remove(); });
      worldItems = [];
      heldItem = null;
      shotCount = 1;
      clearTimeout(shotTimer);
      cloneUntil = 0;
      if (cloneEl) cloneEl.style.display = "none";
      updateItemHud();
    }

    function pickUpItem(type, el) {
      if (!running) return;
      heldItem = type;
      updateItemHud();
      beep(1000);
      for (var i = 0; i < worldItems.length; i++) {
        if (worldItems[i].el === el) { worldItems.splice(i, 1); break; }
      }
      el.remove();
    }

    function updateItemHud() {
      if (heldItem) {
        heldItemText.textContent = ITEM_NAMES[heldItem];
        itemHud.style.display = "block";
      } else {
        itemHud.style.display = "none";
      }
    }

    function activateMultiShot(n, durationMs) {
      shotCount = n;
      clearTimeout(shotTimer);
      shotTimer = setTimeout(function () { shotCount = 1; }, durationMs);
    }

    function activateClone(durationMs) {
      cloneUntil = Date.now() + durationMs;
      if (!cloneEl) {
        cloneEl = gameRocket.cloneNode(true);
        cloneEl.removeAttribute("id");
        cloneEl.style.position = "absolute";
        cloneEl.style.opacity = "0.7";
        cloneEl.style.pointerEvents = "none";
        gw.appendChild(cloneEl);
      }
      cloneEl.style.display = "";
    }

    function useItem() {
      if (heldItem === "mega") activateMultiShot(3, 10000);
      else if (heldItem === "ultra") activateMultiShot(5, 10000);
      else if (heldItem === "clone") activateClone(10000);
      beep(1200);
      heldItem = null;
      updateItemHud();
    }

    function spawnAlien() {
      var tier = ALIEN_TIERS[Math.floor(Math.random() * ALIEN_TIERS.length)];
      var el = document.createElement("div");
      el.className = "alien";
      el.style.width = tier.size + "px";
      el.style.height = Math.round(tier.size * 0.62) + "px";
      el.style.fontSize = Math.round(tier.size * 0.5) + "px";
      el.textContent = "🛸";
      var hpBadge = document.createElement("span");
      hpBadge.className = "alien-hp";
      hpBadge.textContent = tier.hp;
      el.appendChild(hpBadge);
      gw.appendChild(el);
      var pos = randPos(tier.size);
      var angle = Math.random() * Math.PI * 2;
      var speed = 1.4 + Math.random() * 1.4;
      aliens.push({
        el: el, hpBadge: hpBadge, x: pos.x, y: pos.y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        size: tier.size, hp: tier.hp, reward: tier.reward, damage: tier.damage,
        fighterInterval: tier.fighterInterval,
        nextLaunch: Date.now() + tier.fighterInterval * (0.6 + Math.random() * 0.6)
      });
    }

    function spawnFighter(al) {
      var el = document.createElement("div");
      el.className = "fighter";
      el.textContent = "👾";
      var size = 24;
      el.style.width = size + "px";
      el.style.height = size + "px";
      el.style.fontSize = "14px";
      gw.appendChild(el);
      var x = al.x + al.size / 2 - size / 2;
      var y = al.y + al.size / 2 - size / 2;
      var angle = Math.random() * Math.PI * 2;
      var speed = 1.6 + Math.random() * 1.4;
      alienFighters.push({
        el: el, x: x, y: y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        size: size, reward: 3, damage: 0.5
      });
    }

    function clearFighters() {
      alienFighters.forEach(function (f) { f.el.remove(); });
      alienFighters = [];
    }

    function scheduleNextAlien() {
      clearTimeout(alienTimer);
      alienTimer = setTimeout(function () {
        if (running) {
          if (aliens.length < 3) spawnAlien();
          scheduleNextAlien();
        }
      }, 4000 + Math.random() * 3000);
    }

    function clearAliens() {
      aliens.forEach(function (a) { a.el.remove(); });
      aliens = [];
    }

    function spawnExplosionAt(x, y) {
      var boom = document.createElement("div");
      boom.className = "explosion";
      boom.textContent = "💥";
      boom.style.left = (x - 30) + "px";
      boom.style.top = (y - 30) + "px";
      gw.appendChild(boom);
      setTimeout(function () { boom.remove(); }, 600);
    }

    function flashLifeGain() {
      livesText.classList.remove("lives-gain");
      void livesText.offsetWidth;
      livesText.classList.add("lives-gain");
    }

    function updateFuelDisplay() {
      var m = Math.floor(fuelSeconds / 60);
      var s = fuelSeconds % 60;
      fuelText.textContent = m + ":" + (s < 10 ? "0" : "") + s;
      fuelText.classList.toggle("low", fuelSeconds <= 30);
    }

    function refuel() {
      fuelSeconds = 180;
      updateFuelDisplay();
    }

    function startFuelTimer() {
      clearInterval(fuelTimer);
      fuelTimer = setInterval(function () {
        fuelSeconds--;
        updateFuelDisplay();
        if (fuelSeconds <= 0) {
          clearInterval(fuelTimer);
          outOfFuel();
        }
      }, 1000);
    }

    function addStars(n) {
      stars += n;
      starBankForLife += n;
      while (starBankForLife >= 5) {
        starBankForLife -= 5;
        lives++;
        beep(1100);
        flashLifeGain();
      }
      updateHud();
      checkChallenge();
    }

    function formatLives(n) {
      n = Math.max(n, 0);
      return (n % 1 === 0) ? String(n) : n.toFixed(1);
    }

    function updateHud() {
      starsText.textContent = stars;
      milesText.textContent = miles;
      livesText.textContent = "❤️ × " + formatLives(lives);
    }

    function randomChallenge() {
      var types = ["miles", "stars", "shoot"];
      var type = types[Math.floor(Math.random() * types.length)];
      if (type === "miles") {
        var target = miles + (Math.floor(Math.random() * 4) + 2) * 5;
        return { type: "miles", target: target, text: "🛰️ Fly " + target + " total miles!" };
      }
      if (type === "stars") {
        var target2 = stars + (Math.floor(Math.random() * 3) + 2) * 3;
        return { type: "stars", target: target2, text: "⭐ Collect " + target2 + " total stars!" };
      }
      var colors = ["red", "blue", "green", "purple"];
      var color = colors[Math.floor(Math.random() * colors.length)];
      return { type: "shoot", color: color, text: "🔫 Shoot the " + color.toUpperCase() + " asteroid!" };
    }

    function newChallenge() {
      currentChallenge = randomChallenge();
      challengeText.textContent = currentChallenge.text;
    }

    function completeChallenge() {
      currentChallenge = null; // avoid re-triggering while the bonus/transition plays out
      challengeCard.classList.remove("done");
      void challengeCard.offsetWidth;
      challengeCard.classList.add("done");
      challengeText.textContent = "🎉 Nice! +30 bonus stars!";
      beep(950);
      addStars(30);
      refuel();
      setTimeout(function () { newChallenge(); }, 1400);
    }

    function checkChallenge() {
      if (!currentChallenge) return;
      if (currentChallenge.type === "miles" && miles >= currentChallenge.target) completeChallenge();
      else if (currentChallenge.type === "stars" && stars >= currentChallenge.target) completeChallenge();
    }

    function hitByAsteroid(a) {
      lives -= 0.5;
      updateHud();
      beep(120);
      gameRocket.classList.add("hit");
      invulnerable = true;
      setTimeout(function () { gameRocket.classList.remove("hit"); invulnerable = false; }, 1200);
      respawnAsteroid(a);
      if (lives <= 0) crash();
    }

    function hitByAlien(al) {
      lives -= al.damage;
      updateHud();
      beep(120);
      gameRocket.classList.add("hit");
      invulnerable = true;
      setTimeout(function () { gameRocket.classList.remove("hit"); invulnerable = false; }, 1200);
      spawnExplosionAt(al.x + al.size / 2, al.y + al.size / 2);
      al.el.remove();
      var idx = aliens.indexOf(al);
      if (idx >= 0) aliens.splice(idx, 1);
      if (lives <= 0) crash();
    }

    function crash() {
      running = false;
      clearTimeout(alienTimer);
      clearInterval(fuelTimer);
      clearTimeout(itemTimer);
      clearTimeout(shotTimer);
      beep(80);
      spawnExplosionAt(rocketX, rocketY);
      gameRocket.style.display = "none";
      setTimeout(function () {
        document.getElementById("gameoverIcon").textContent = "💥";
        document.getElementById("gameoverTitle").textContent = "You Crashed!";
        document.getElementById("gameoverStats").textContent = "⭐ " + stars + " stars flown with 🛰️ " + miles + " miles!";
        document.getElementById("gameoverOverlay").style.display = "flex";
      }, 550);
    }

    function outOfFuel() {
      running = false;
      clearTimeout(alienTimer);
      clearInterval(fuelTimer);
      clearTimeout(itemTimer);
      clearTimeout(shotTimer);
      beep(100);
      gameRocket.style.display = "none";
      setTimeout(function () {
        document.getElementById("gameoverIcon").textContent = "⛽";
        document.getElementById("gameoverTitle").textContent = "Out of Fuel!";
        document.getElementById("gameoverStats").textContent = "⭐ " + stars + " stars flown with 🛰️ " + miles + " miles!";
        document.getElementById("gameoverOverlay").style.display = "flex";
      }, 400);
    }

    function updateRocket() {
      rocketX = mouseX;
      rocketY = mouseY;
      gameRocket.style.left = (rocketX - ROCKET_W / 2) + "px";
      gameRocket.style.top = (rocketY - ROCKET_H / 2) + "px";

      if (cloneEl) {
        if (Date.now() < cloneUntil) {
          cloneEl.style.display = "";
          cloneEl.style.left = (rocketX - ROCKET_W / 2 + 70) + "px";
          cloneEl.style.top = (rocketY - ROCKET_H / 2) + "px";
        } else {
          cloneEl.style.display = "none";
        }
      }
    }

    function updateAsteroids() {
      asteroids.forEach(function (a) {
        a.x += a.vx;
        a.y += a.vy;
        if (a.x <= 0 || a.x >= window.innerWidth - a.size) a.vx *= -1;
        if (a.y <= 0 || a.y >= window.innerHeight - a.size) a.vy *= -1;
        a.x = Math.max(0, Math.min(window.innerWidth - a.size, a.x));
        a.y = Math.max(0, Math.min(window.innerHeight - a.size, a.y));
        a.el.style.left = a.x + "px";
        a.el.style.top = a.y + "px";
      });
    }

    function updateBullets() {
      for (var i = bullets.length - 1; i >= 0; i--) {
        var b = bullets[i];
        b.y -= 10;
        if (b.y < -20) { b.el.remove(); bullets.splice(i, 1); continue; }
        b.el.style.left = b.x + "px";
        b.el.style.top = b.y + "px";
        var hit = false;

        for (var j = 0; j < asteroids.length; j++) {
          var a = asteroids[j];
          var ax = a.x + a.size / 2, ay = a.y + a.size / 2;
          if (Math.abs(b.x - ax) < a.size / 2 + 6 && Math.abs(b.y - ay) < a.size / 2 + 6) {
            b.el.remove(); bullets.splice(i, 1);
            beep(950);
            if (currentChallenge && currentChallenge.type === "shoot" && currentChallenge.color === a.color) completeChallenge();
            addStars(2);
            respawnAsteroid(a);
            hit = true;
            break;
          }
        }
        if (hit) continue;

        for (var k = 0; k < aliens.length; k++) {
          var al = aliens[k];
          var alx = al.x + al.size / 2, aly = al.y + al.size / 2;
          if (Math.abs(b.x - alx) < al.size / 2 + 6 && Math.abs(b.y - aly) < al.size / 2 + 6) {
            b.el.remove(); bullets.splice(i, 1);
            al.hp--;
            beep(500);
            if (al.hp <= 0) {
              spawnExplosionAt(alx, aly);
              addStars(al.reward);
              al.el.remove();
              aliens.splice(k, 1);
            } else {
              al.hpBadge.textContent = al.hp;
              al.el.classList.add("flash");
              setTimeout((function (el) { return function () { el.classList.remove("flash"); }; })(al.el), 150);
            }
            hit = true;
            break;
          }
        }
        if (hit) continue;

        for (var n = 0; n < alienFighters.length; n++) {
          var f = alienFighters[n];
          var fx = f.x + f.size / 2, fy = f.y + f.size / 2;
          if (Math.abs(b.x - fx) < f.size / 2 + 6 && Math.abs(b.y - fy) < f.size / 2 + 6) {
            b.el.remove(); bullets.splice(i, 1);
            spawnExplosionAt(fx, fy);
            addStars(f.reward);
            f.el.remove();
            alienFighters.splice(n, 1);
            beep(700);
            hit = true;
            break;
          }
        }
        if (hit) continue;

        for (var m = 0; m < starsList.length; m++) {
          var s = starsList[m];
          var sx = s.x + s.size / 2, sy = s.y + s.size / 2;
          if (Math.abs(b.x - sx) < s.size / 2 + 6 && Math.abs(b.y - sy) < s.size / 2 + 6) {
            b.el.remove(); bullets.splice(i, 1);
            s.el.remove();
            starsList.splice(m, 1);
            beep(600 + Math.random() * 200);
            refuel();
            addStars(1);
            starsList.push(spawnStar());
            break;
          }
        }
      }
    }

    function checkRocketAsteroidCollisions() {
      if (invulnerable) return;
      for (var i = 0; i < asteroids.length; i++) {
        var a = asteroids[i];
        var ax = a.x + a.size / 2, ay = a.y + a.size / 2;
        var dx = rocketX - ax, dy = rocketY - ay;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < a.size / 2 + 20) { hitByAsteroid(a); break; }
      }
    }

    function updateAliens() {
      var now = Date.now();
      aliens.forEach(function (a) {
        a.x += a.vx;
        a.y += a.vy;
        if (a.x <= 0 || a.x >= window.innerWidth - a.size) a.vx *= -1;
        if (a.y <= 0 || a.y >= window.innerHeight - a.size) a.vy *= -1;
        a.x = Math.max(0, Math.min(window.innerWidth - a.size, a.x));
        a.y = Math.max(0, Math.min(window.innerHeight - a.size, a.y));
        a.el.style.left = a.x + "px";
        a.el.style.top = a.y + "px";

        if (now >= a.nextLaunch && alienFighters.length < 8) {
          spawnFighter(a);
          a.nextLaunch = now + a.fighterInterval * (0.7 + Math.random() * 0.6);
        }
      });
    }

    function updateFighters() {
      alienFighters.forEach(function (f) {
        f.x += f.vx;
        f.y += f.vy;
        if (f.x <= 0 || f.x >= window.innerWidth - f.size) f.vx *= -1;
        if (f.y <= 0 || f.y >= window.innerHeight - f.size) f.vy *= -1;
        f.x = Math.max(0, Math.min(window.innerWidth - f.size, f.x));
        f.y = Math.max(0, Math.min(window.innerHeight - f.size, f.y));
        f.el.style.left = f.x + "px";
        f.el.style.top = f.y + "px";
      });
    }

    function checkRocketAlienCollisions() {
      if (invulnerable) return;
      for (var i = 0; i < aliens.length; i++) {
        var al = aliens[i];
        var ax = al.x + al.size / 2, ay = al.y + al.size / 2;
        var dx = rocketX - ax, dy = rocketY - ay;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < al.size / 2 + 20) { hitByAlien(al); break; }
      }
    }

    // Fighters (lone alien drones without a ship) are harmless on contact —
    // they can only be dealt with by shooting them.

    function updateMiles() {
      var dx = rocketX - lastRocketX, dy = rocketY - lastRocketY;
      var d = Math.sqrt(dx * dx + dy * dy);
      distanceAccum += d;
      lastRocketX = rocketX; lastRocketY = rocketY;
      var newMiles = Math.floor(distanceAccum / 60);
      if (newMiles !== miles) { miles = newMiles; updateHud(); checkChallenge(); }
    }

    function gameLoop() {
      if (!running) return;
      updateRocket();
      updateAsteroids();
      updateAliens();
      updateFighters();
      updateBullets();
      checkRocketAsteroidCollisions();
      checkRocketAlienCollisions();
      updateMiles();
      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      document.getElementById("buildScreen").parentElement.style.display = "none";
      document.getElementById("gameScreen").style.display = "block";
      document.getElementById("gameoverOverlay").style.display = "none";
      gameRocket.style.display = "";

      stars = 0; miles = 0; lives = 3; distanceAccum = 0; starBankForLife = 0;
      updateHud();
      refuel();
      startFuelTimer();
      clearBullets();
      clearAliens();
      clearFighters();
      clearItems();
      initAsteroids();
      initStars();
      newChallenge();
      scheduleNextAlien();
      scheduleNextItem();

      mouseX = window.innerWidth / 2; mouseY = window.innerHeight / 2;
      rocketX = mouseX; rocketY = mouseY;
      lastRocketX = rocketX; lastRocketY = rocketY;

      running = true;
      requestAnimationFrame(gameLoop);
    }

    document.getElementById("blastOffBtn").addEventListener("click", function () {
      beep(800);
      startGame();
    });

    document.getElementById("flyAgainBtn").addEventListener("click", startGame);

    document.getElementById("rebuildBtn").addEventListener("click", function () {
      running = false;
      clearTimeout(alienTimer);
      clearInterval(fuelTimer);
      clearTimeout(itemTimer);
      clearFighters();
      clearItems();
      document.getElementById("gameScreen").style.display = "none";
      document.getElementById("buildScreen").parentElement.style.display = "block";
    });

    document.getElementById("gameScreen").addEventListener("contextmenu", function (e) {
      e.preventDefault();
    });
  </script>
</body>
</html>
